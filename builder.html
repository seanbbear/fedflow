<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FedFlow Builder Prototype</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --panel: #ffffff;
        --panel-soft: #eef2ff;
        --line: #d8def0;
        --ink: #10213d;
        --muted: #596a85;
        --brand: #0f6f66;
        --brand-soft: #d7f0ed;
        --accent: #e9892f;
        --danger: #c83737;
        --radius: 14px;
        --shadow: 0 10px 30px rgba(13, 28, 53, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "IBM Plex Sans", "Avenir Next", sans-serif;
        background: #ececec;
        color: var(--ink);
      }

      .builder-header {
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        background: #f7f7f7;
        border-bottom: 1px solid #dfdfdf;
      }

      .builder-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
      }

      .header-tools {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn {
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 9px;
        background: #e6eaef;
        color: #5d6e88;
        font-weight: 800;
        cursor: pointer;
      }

      .app {
        height: calc(100vh - 72px);
        display: grid;
        grid-template-columns: 276px minmax(320px, 1fr);
        gap: 12px;
        padding: 12px;
        position: relative;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: auto;
      }

      .panel-head {
        position: sticky;
        top: 0;
        background: linear-gradient(180deg, #ffffff 85%, rgba(255, 255, 255, 0.8));
        backdrop-filter: blur(4px);
        padding: 16px 16px 10px;
        border-bottom: 1px solid var(--line);
        z-index: 2;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 16px;
        letter-spacing: 0.2px;
      }

      .panel-head p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .palette-list,
      .canvas-list {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .palette-panel {
        background: #f5f5f5;
        border: 1px solid #e0e0e0;
      }

      .palette-panel .panel-head {
        background: transparent;
        border-bottom: 0;
        padding: 10px 12px 6px;
      }

      .palette-search {
        width: 100%;
        border: 1px solid #cfd6e3;
        border-radius: 999px;
        padding: 9px 12px;
        font-size: 12px;
        color: #5d6b83;
        background: #f9fbff;
      }

      .chip {
        background: var(--panel-soft);
        color: #374c74;
        border: 1px solid #cfd7f6;
        border-radius: 999px;
        font-size: 12px;
        padding: 4px 10px;
      }

      .action-btn,
      .flow-card {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 10px 12px;
        text-align: left;
        cursor: pointer;
      }

      .action-btn:hover,
      .flow-card:hover {
        border-color: #a8b9e6;
      }

      .action-title,
      .flow-title {
        font-weight: 700;
        font-size: 14px;
      }

      .action-sub,
      .flow-sub {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .flow-card.active {
        border-color: var(--brand);
        box-shadow: inset 0 0 0 1px var(--brand);
        background: #f7fffe;
      }

      .action-btn {
        user-select: none;
        border: 1px solid #d4d9e5;
        background: #fff;
      }

      .action-btn[data-type="form"] {
        background: #e7f0e6;
      }

      .action-btn[data-type="condition"] {
        background: #f4e6d8;
      }

      .action-btn[data-type="approval"] {
        background: #ece5f5;
      }

      .action-btn[data-type="agent"] {
        background: #dce8f6;
      }

      .action-btn[data-type="tool"] {
        background: #f2e9e4;
      }

      .action-btn[data-type="mailReader"] {
        background: #e0e4f7;
      }

      .action-btn[draggable="true"] {
        cursor: grab;
      }

      .action-btn.dragging {
        opacity: 0.55;
      }

      .flow-topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 8px 12px 0;
        gap: 8px;
      }

      .flow-topbar .hint {
        margin: 0;
      }

      .flow-tools {
        display: flex;
        gap: 8px;
      }

      .canvas-wrap {
        padding: 12px;
      }

      .flow-canvas {
        position: relative;
        min-height: calc(100vh - 170px);
        border: 1px dashed #d7dbe5;
        border-radius: 14px;
        background:
          radial-gradient(circle, #d3d8e3 1px, transparent 1px);
        background-size: 26px 26px;
        background-color: #f8f9fb;
        overflow: hidden;
      }

      .flow-canvas.dropping {
        box-shadow: inset 0 0 0 2px #88b8b1;
        border-color: #88b8b1;
      }

      .edge-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: auto;
        z-index: 3;
      }

      .canvas-empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
        pointer-events: none;
        padding: 24px;
      }

      .canvas-node {
        position: absolute;
        width: 250px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 10px 12px;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(13, 28, 53, 0.08);
        z-index: 6;
      }

      .canvas-node[data-type="form"] {
        background: #e7f0e6;
        border-color: #c7dcc5;
      }

      .canvas-node[data-type="condition"] {
        background: #f4e6d8;
        border-color: #e3cdb3;
      }

      .canvas-node[data-type="approval"] {
        background: #ece5f5;
        border-color: #d5c7ea;
      }

      .canvas-node[data-type="agent"] {
        background: #dce8f6;
        border-color: #bdd2eb;
      }

      .canvas-node[data-type="tool"] {
        background: #f2e9e4;
        border-color: #e4d3c7;
      }

      .canvas-node[data-type="mailReader"] {
        background: #e0e4f7;
        border-color: #c7cfee;
      }

      .edge-hit {
        stroke: transparent;
        stroke-width: 12;
        fill: none;
        cursor: pointer;
        pointer-events: stroke;
      }

      .canvas-node.dragging {
        cursor: grabbing;
      }

      .canvas-node.active {
        border-color: var(--brand);
        box-shadow:
          inset 0 0 0 1px var(--brand),
          0 10px 22px rgba(15, 111, 102, 0.2);
        filter: saturate(1.05);
      }

      .node-order {
        font-size: 11px;
        color: #4f6388;
        margin-bottom: 4px;
      }

      .node-actions {
        margin-top: 8px;
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }

      .btn-subtle {
        background: #edf3ff;
        color: #3d5580;
      }

      .flow-canvas.connecting {
        cursor: crosshair;
      }

      .node-handle {
        position: absolute;
        top: 50%;
        width: 14px;
        height: 14px;
        margin-top: -7px;
        border-radius: 999px;
        border: 2px solid #ffffff;
        box-shadow: 0 0 0 1px #90a5d2;
        background: #6d83b2;
        cursor: crosshair;
        z-index: 4;
      }

      .node-handle.input {
        left: -8px;
        background: #4f7399;
      }

      .node-handle.output {
        right: -8px;
        background: var(--brand);
      }

      .node-handle.output.active {
        box-shadow: 0 0 0 2px #bde4df;
      }

      .node-handle.output.output-true {
        top: 36%;
        background: var(--brand);
      }

      .node-handle.output.output-false {
        top: 64%;
        background: var(--accent);
      }

      .node-handle.output.output-approve {
        top: 36%;
        background: var(--brand);
      }

      .node-handle.output.output-reject {
        top: 64%;
        background: #c04646;
      }

      .handle-label {
        position: absolute;
        right: 10px;
        font-size: 10px;
        font-weight: 700;
        color: #61749a;
      }

      .handle-label.label-true {
        top: 28%;
      }

      .handle-label.label-false {
        top: 56%;
      }

      .handle-label.label-approve {
        top: 28%;
      }

      .handle-label.label-reject {
        top: 56%;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--brand);
        color: #fff;
      }

      .btn-danger {
        background: #ffe9e9;
        color: var(--danger);
      }

      .form-wrap {
        padding: 12px 14px 20px;
      }

      .canvas-panel .panel-head {
        position: static;
        padding: 10px 14px 8px;
      }

      .config-panel {
        position: fixed;
        top: 84px;
        right: 12px;
        bottom: 12px;
        width: 360px;
        z-index: 30;
        transform: translateX(calc(100% + 20px));
        transition: transform 0.2s ease;
      }

      body.config-open .config-panel {
        transform: translateX(0);
      }

      .section {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .section h3 {
        margin: 0 0 10px;
        font-size: 14px;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
      }

      .field label {
        font-size: 12px;
        color: #435576;
        font-weight: 600;
      }

      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 9px;
        font-size: 13px;
        background: #fff;
      }

      .field textarea {
        min-height: 80px;
        resize: vertical;
      }

      .field-inline {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .field-card {
        border: 1px solid #cfd7f6;
        border-radius: 10px;
        padding: 10px;
        background: #f9fbff;
        margin-bottom: 10px;
      }

      .field-card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .field-card-head strong {
        font-size: 13px;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 1100px) {
        .app {
          grid-template-columns: 1fr;
        }

        .config-panel {
          position: static;
          width: auto;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="builder-header">
      <div class="builder-title">
        <button class="icon-btn" id="backHomeTop">&lt;</button>
        <button class="btn btn-subtle" id="editFlowNameBtn" style="padding:6px 10px;">未命名流程</button>
      </div>
      <div class="header-tools">
        <button class="btn btn-subtle" id="backHomeHeader">回到首頁</button>
        <button class="btn btn-primary" id="saveFlow">儲存</button>
      </div>
    </header>

    <main class="app">
      <aside class="panel palette-panel">
        <div class="panel-head">
          <input class="palette-search" id="paletteSearch" placeholder="依照名稱或用途搜尋" />
        </div>
        <div class="palette-list" id="palette"></div>
      </aside>

      <section class="panel canvas-panel">
        <div class="panel-head">
          <h2 id="flowTitle">未命名流程</h2>
          <p>拖曳左側 Action 到畫布，點選節點後可編輯設定</p>
        </div>
        <div class="flow-topbar">
          <span class="chip" id="flowCount">0 actions</span>
          <p class="hint">可拖曳節點調整位置</p>
          <div class="flow-tools"></div>
        </div>
        <div class="canvas-wrap">
          <div class="flow-canvas" id="canvas"></div>
        </div>
      </section>

      <aside class="panel config-panel">
        <div class="panel-head">
          <h2>設定面板</h2>
          <p id="configHint">請先在中間選一個 Action</p>
        </div>
        <div class="form-wrap" id="config"></div>
      </aside>
    </main>

    <script>
      const actionMeta = {
        form: { name: "表單 Form", desc: "收集資料並產生 form.* 變數" },
        condition: { name: "判斷 Condition", desc: "依條件分流 True / False" },
        approval: { name: "審核 Approval", desc: "人工審核 approve / reject" },
        sendAsUser: { name: "使用者寄信", desc: "以執行者身分寄送信件" },
        agent: { name: "Agent", desc: "摘要 / 分類 / 擷取 / 生成" },
        tool: { name: "使用工具 Tool Provider", desc: "RAG / FAQ / KB / Gmail Tool" },
        mailReader: { name: "讀取信件 Mail Reader", desc: "讀取信件轉為 mail.* 變數" }
      };

      const members = ["HR", "IT", "主管", "法務", "財務", "行政"];
      const providers = [
        "FedGPT Agentic RAG",
        "FedGPT Simple RAG",
        "KB Toolkit",
        "FedGPT FAQ",
        "Gmail Tool"
      ];

      let flow = [];
      let edges = [];
      let activeId = null;
      let connectFromId = null;
      let connectFromBranch = null;
      let connectPointer = null;
      let suppressCanvasCancelOnce = false;
      const DRAFT_KEY = "fedflow:builder:draft";
      const PUBLISHED_KEY = "fedflow:builder:published";
      const FLOWS_KEY = "fedflow:flows";
      let currentFlowId = null;
      let currentFlowName = "未命名流程";

      function uid() {
        return Math.random().toString(36).slice(2, 9);
      }

      function setFlowName(name) {
        const clean = String(name || "").trim();
        currentFlowName = clean || "未命名流程";
        document.getElementById("flowTitle").textContent = currentFlowName;
        document.getElementById("editFlowNameBtn").textContent = currentFlowName;
      }

      function getAllFlows() {
        try {
          const parsed = JSON.parse(localStorage.getItem(FLOWS_KEY) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch (err) {
          return [];
        }
      }

      function saveAllFlows(flows) {
        localStorage.setItem(FLOWS_KEY, JSON.stringify(flows));
      }

      function upsertCurrentFlow() {
        if (!currentFlowId) currentFlowId = uid();
        const all = getAllFlows();
        const now = new Date().toISOString();
        const idx = all.findIndex((x) => x.id === currentFlowId);
        const payload = {
          id: currentFlowId,
          name: currentFlowName || "未命名流程",
          flow,
          edges,
          updatedAt: now,
          createdAt: idx >= 0 ? all[idx].createdAt || now : now
        };
        if (idx >= 0) all[idx] = payload;
        else all.unshift(payload);
        saveAllFlows(all);
        return payload;
      }

      function updateFlowCount() {
        document.getElementById("flowCount").textContent = `${flow.length} actions / ${edges.length} links`;
      }

      function saveDraft() {
        localStorage.setItem(
          DRAFT_KEY,
          JSON.stringify({
            version: 1,
            id: currentFlowId,
            name: currentFlowName,
            flow,
            edges,
            updatedAt: new Date().toISOString()
          })
        );
      }

      function normalizeEdges(rawEdges, nodes) {
        const counts = new Map();
        return (Array.isArray(rawEdges) ? rawEdges : []).map((edge) => {
          const fromNode = (nodes || []).find((n) => n.id === edge.from);
          if (!fromNode || (fromNode.type !== "condition" && fromNode.type !== "approval")) {
            return { ...edge, branch: edge.branch || "default" };
          }
          if (fromNode.type === "condition" && (edge.branch === "true" || edge.branch === "false")) return edge;
          if (fromNode.type === "approval" && (edge.branch === "approve" || edge.branch === "reject")) return edge;
          const used = counts.get(edge.from) || 0;
          counts.set(edge.from, used + 1);
          if (fromNode.type === "condition") return { ...edge, branch: used === 0 ? "true" : "false" };
          return { ...edge, branch: used === 0 ? "approve" : "reject" };
        });
      }

      function addAction(type, position) {
        const item = {
          id: uid(),
          type,
          name: "",
          config: defaultConfig(type),
          x: position?.x ?? 40 + (flow.length % 3) * 270,
          y: position?.y ?? 40 + Math.floor(flow.length / 3) * 140
        };
        flow.push(item);
        activeId = item.id;
        saveDraft();
        renderCanvas();
        renderConfig();
      }

      function defaultConfig(type) {
        if (type === "form") {
          return { title: "", assignee: members[0], due: "", desc: "", fields: [] };
        }
        if (type === "condition") {
          return { sourceForm: "", sourceField: "", operator: "=", compareFrom: "manual", compareValue: "", compareVar: "" };
        }
        if (type === "approval") {
          return { title: "", reviewer: members[0], applicant: "{{trigger.user}}", desc: "", sla: "" };
        }
        if (type === "sendAsUser") {
          return { to: "", cc: "", bcc: "", subject: "", body: "", attachment: "" };
        }
        if (type === "agent") {
          return { task: "分類", input: "{{mail.body}}", maxToken: 800 };
        }
        if (type === "tool") {
          return { taskName: "", provider: providers[0], taskType: "查詢", input: "", providerCfg: {} };
        }
        if (type === "mailReader") {
          return { mailbox: "service@fedflow.local", mode: "基礎", from: "", to: "", subject: "", query: "", scope: "最新一封", n: 5, download: false, markRead: false };
        }
        return {};
      }

      function getActive() {
        return flow.find((f) => f.id === activeId);
      }

      function getNodeName(item) {
        return (item?.name || "").trim() || actionMeta[item.type]?.name || "Action";
      }

      function setConfig(patch) {
        const active = getActive();
        if (!active) return;
        active.config = { ...active.config, ...patch };
        saveDraft();
        renderCanvas();
        renderConfig();
      }

      function removeAction(id) {
        flow = flow.filter((x) => x.id !== id);
        edges = edges.filter((x) => x.from !== id && x.to !== id);
        if (activeId === id) activeId = flow[0]?.id || null;
        if (connectFromId === id) {
          connectFromId = null;
          connectFromBranch = null;
        }
        saveDraft();
        renderCanvas();
        renderConfig();
      }

      function renderPalette() {
        const palette = document.getElementById("palette");
        const q = (document.getElementById("paletteSearch")?.value || "").trim().toLowerCase();
        palette.innerHTML = "";
        Object.entries(actionMeta)
          .filter(([, meta]) => {
            if (!q) return true;
            return `${meta.name} ${meta.desc}`.toLowerCase().includes(q);
          })
          .forEach(([type, meta]) => {
          const btn = document.createElement("button");
          btn.className = "action-btn";
          btn.setAttribute("data-type", type);
          btn.draggable = true;
          btn.innerHTML = `<div class="action-title">${meta.name}</div><div class="action-sub">${meta.desc}</div>`;
          btn.onclick = () => addAction(type);
          btn.ondragstart = (e) => {
            btn.classList.add("dragging");
            e.dataTransfer.setData("text/action-type", type);
            e.dataTransfer.effectAllowed = "copy";
          };
          btn.ondragend = () => btn.classList.remove("dragging");
          palette.appendChild(btn);
          });
      }

      function renderCanvas() {
        const canvas = document.getElementById("canvas");
        canvas.innerHTML = "";
        canvas.classList.toggle("connecting", Boolean(connectFromId));
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("class", "edge-layer");
        svg.setAttribute("width", "100%");
        svg.setAttribute("height", "100%");
        svg.setAttribute("viewBox", `0 0 ${canvas.clientWidth || 1} ${canvas.clientHeight || 1}`);
        svg.setAttribute("preserveAspectRatio", "none");
        canvas.appendChild(svg);
        if (flow.length === 0) {
          const empty = document.createElement("div");
          empty.className = "canvas-empty";
          empty.innerHTML = `<div><strong>把左側 Action 拖進來開始建流程</strong><div class="hint">也可直接點擊 Action 加入</div></div>`;
          canvas.appendChild(empty);
        }
        flow.forEach((item, i) => {
          const card = document.createElement("div");
          card.className = `canvas-node ${item.id === activeId ? "active" : ""}`;
          card.setAttribute("data-node-id", item.id);
          card.setAttribute("data-type", item.type);
          card.style.left = `${item.x || 0}px`;
          card.style.top = `${item.y || 0}px`;
          const outputHandles =
            item.type === "condition"
              ? `
                <span class="node-handle output output-true ${connectFromId === item.id && connectFromBranch === "true" ? "active" : ""}" data-handle="out" data-branch="true" title="符合"></span>
                <span class="node-handle output output-false ${connectFromId === item.id && connectFromBranch === "false" ? "active" : ""}" data-handle="out" data-branch="false" title="不符合"></span>
                <span class="handle-label label-true">符合</span>
                <span class="handle-label label-false">不符合</span>
              `
              : item.type === "approval"
                ? `
                <span class="node-handle output output-approve ${connectFromId === item.id && connectFromBranch === "approve" ? "active" : ""}" data-handle="out" data-branch="approve" title="通過"></span>
                <span class="node-handle output output-reject ${connectFromId === item.id && connectFromBranch === "reject" ? "active" : ""}" data-handle="out" data-branch="reject" title="退回"></span>
                <span class="handle-label label-approve">通過</span>
                <span class="handle-label label-reject">退回</span>
              `
              : `<span class="node-handle output ${connectFromId === item.id ? "active" : ""}" data-handle="out" data-branch="default" title="建立連線"></span>`;
          card.innerHTML = `
            <span class="node-handle input" data-handle="in" title="接收連線"></span>
            ${outputHandles}
            <div class="flow-title">${escapeHtml(getNodeName(item))}</div>
            <div class="flow-sub">${subtitle(item)}</div>
            <div class="node-actions">
              <button class="btn btn-danger" style="padding:6px 10px;font-size:12px;">刪除</button>
            </div>
          `;
          card.onclick = () => {
            if (connectFromId && connectFromId !== item.id) {
              addEdge(connectFromId, item.id, connectFromBranch || "default");
              connectFromId = null;
              connectFromBranch = null;
              connectPointer = null;
              renderCanvas();
              return;
            }
            activeId = item.id;
            renderCanvas();
            renderConfig();
          };
          const outHandles = card.querySelectorAll('[data-handle="out"]');
          const inHandle = card.querySelector('[data-handle="in"]');
          outHandles.forEach((outHandle) => {
            outHandle.onmousedown = (e) => {
              e.stopPropagation();
              e.preventDefault();
              const branch = outHandle.getAttribute("data-branch") || "default";
              const toggledOff = connectFromId === item.id && connectFromBranch === branch;
              if (toggledOff) {
                connectFromId = null;
                connectFromBranch = null;
                connectPointer = null;
              } else {
                connectFromId = item.id;
                connectFromBranch = branch;
                connectPointer = { x: e.clientX, y: e.clientY };
              }
              suppressCanvasCancelOnce = true;
              renderCanvas();
            };
          });
          inHandle.onmousedown = (e) => {
            e.stopPropagation();
            e.preventDefault();
            if (!connectFromId) return;
            if (connectFromId !== item.id) addEdge(connectFromId, item.id, connectFromBranch || "default");
            connectFromId = null;
            connectFromBranch = null;
            connectPointer = null;
            renderCanvas();
          };
          card.querySelector("button").onclick = (e) => {
            e.stopPropagation();
            removeAction(item.id);
          };
          enableNodeDrag(card, item, canvas, svg);
          canvas.appendChild(card);
        });
        renderEdges(svg, canvas);
        updateFlowCount();
      }

      function enableNodeDrag(nodeEl, nodeData, canvasEl, svgEl) {
        nodeEl.addEventListener("mousedown", (e) => {
          if (e.target.tagName === "BUTTON") return;
          if (e.target.closest && e.target.closest(".node-handle")) return;
          let dragging = true;
          let offsetX = 0;
          let offsetY = 0;
          nodeEl.classList.add("dragging");
          const rect = nodeEl.getBoundingClientRect();
          offsetX = e.clientX - rect.left;
          offsetY = e.clientY - rect.top;
          e.preventDefault();

          const onMove = (evt) => {
            if (!dragging) return;
            const cRect = canvasEl.getBoundingClientRect();
            const nextX = evt.clientX - cRect.left - offsetX;
            const nextY = evt.clientY - cRect.top - offsetY;
            const maxX = Math.max(0, cRect.width - nodeEl.offsetWidth - 8);
            const maxY = Math.max(0, cRect.height - nodeEl.offsetHeight - 8);
            nodeData.x = clamp(nextX, 0, maxX);
            nodeData.y = clamp(nextY, 0, maxY);
            nodeEl.style.left = `${nodeData.x}px`;
            nodeEl.style.top = `${nodeData.y}px`;
            renderEdges(svgEl, canvasEl);
          };

          const onUp = () => {
            if (!dragging) return;
            dragging = false;
            nodeEl.classList.remove("dragging");
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
          };

          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
        });
      }

      function addEdge(fromId, toId, branch = "default") {
        if (fromId === toId) return;
        const fromNode = flow.find((x) => x.id === fromId);
        if (!fromNode || !flow.find((x) => x.id === toId)) return;
        let resolvedBranch = "default";
        if (fromNode.type === "condition") resolvedBranch = branch === "false" ? "false" : "true";
        if (fromNode.type === "approval") resolvedBranch = branch === "reject" ? "reject" : "approve";
        if (edges.find((x) => x.from === fromId && x.to === toId && (x.branch || "default") === resolvedBranch)) return;
        if (fromNode.type === "condition" || fromNode.type === "approval") {
          edges = edges.filter((x) => !(x.from === fromId && (x.branch || "default") === resolvedBranch));
        }
        edges.push({ id: uid(), from: fromId, to: toId, branch: resolvedBranch });
        saveDraft();
      }

      function removeEdge(edgeId) {
        edges = edges.filter((e) => e.id !== edgeId);
        saveDraft();
        renderCanvas();
      }

      function renderEdges(svgEl, canvasEl) {
        if (!svgEl) return;
        svgEl.innerHTML = `
          <defs>
            <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
              <path d="M0,0 L8,4 L0,8 Z" fill="#6d83b2"></path>
            </marker>
          </defs>
        `;
        const nodeMap = new Map(flow.map((x) => [x.id, x]));
        edges.forEach((edge) => {
          const from = nodeMap.get(edge.from);
          const to = nodeMap.get(edge.to);
          if (!from || !to) return;
          const branch = edge.branch || "default";
          const fromSide =
            branch === "true" ? "out_true" :
            branch === "false" ? "out_false" :
            branch === "approve" ? "out_approve" :
            branch === "reject" ? "out_reject" : "out";
          const fromPt = getHandlePoint(canvasEl, edge.from, fromSide);
          const toPt = getHandlePoint(canvasEl, edge.to, "in");
          if (!fromPt || !toPt) return;
          const x1 = fromPt.x;
          const y1 = fromPt.y;
          const x2 = toPt.x;
          const y2 = toPt.y;
          const c1 = x1 + 40;
          const c2 = x2 - 40;
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          const d = `M ${x1} ${y1} C ${c1} ${y1}, ${c2} ${y2}, ${x2} ${y2}`;
          path.setAttribute("d", d);
          const edgeColor =
            branch === "true" ? "#0f6f66" :
            branch === "false" ? "#c67b2d" :
            branch === "approve" ? "#0f6f66" :
            branch === "reject" ? "#c04646" : "#6d83b2";
          path.setAttribute("stroke", edgeColor);
          path.setAttribute("stroke-width", "2");
          path.setAttribute("fill", "none");
          path.setAttribute("marker-end", "url(#arrow)");
          path.setAttribute("pointer-events", "none");
          svgEl.appendChild(path);

          const hit = document.createElementNS("http://www.w3.org/2000/svg", "path");
          hit.setAttribute("d", d);
          hit.setAttribute("class", "edge-hit");
          hit.setAttribute("title", "點擊刪除連線");
          hit.addEventListener("mousedown", (evt) => {
            evt.stopPropagation();
            evt.preventDefault();
          });
          hit.addEventListener("click", (evt) => {
            evt.stopPropagation();
            evt.preventDefault();
            removeEdge(edge.id);
          });
          svgEl.appendChild(hit);

          if (branch === "true" || branch === "false" || branch === "approve" || branch === "reject") {
            const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
            label.textContent =
              branch === "true" ? "符合" :
              branch === "false" ? "不符合" :
              branch === "approve" ? "通過" : "退回";
            label.setAttribute("x", String(x1 + 10));
            label.setAttribute("y", String(y1 - 8));
            label.setAttribute("font-size", "11");
            label.setAttribute("fill", edgeColor);
            svgEl.appendChild(label);
          }
        });

        if (connectFromId && connectPointer) {
          if (!nodeMap.get(connectFromId)) return;
          const canvasRect = canvasEl.getBoundingClientRect();
          const fromSide =
            connectFromBranch === "true" ? "out_true" :
            connectFromBranch === "false" ? "out_false" :
            connectFromBranch === "approve" ? "out_approve" :
            connectFromBranch === "reject" ? "out_reject" : "out";
          const fromPt = getHandlePoint(canvasEl, connectFromId, fromSide);
          if (!fromPt) return;
          const x1 = fromPt.x;
          const y1 = fromPt.y;
          const x2 = connectPointer.x - canvasRect.left;
          const y2 = connectPointer.y - canvasRect.top;
          const c1 = x1 + 40;
          const c2 = x2 - 40;
          const preview = document.createElementNS("http://www.w3.org/2000/svg", "path");
          preview.setAttribute("d", `M ${x1} ${y1} C ${c1} ${y1}, ${c2} ${y2}, ${x2} ${y2}`);
          preview.setAttribute(
            "stroke",
            connectFromBranch === "false"
              ? "#c67b2d"
              : connectFromBranch === "reject"
                ? "#c04646"
                : "#0c7d72"
          );
          preview.setAttribute("stroke-width", "3");
          preview.setAttribute("fill", "none");
          preview.setAttribute("stroke-dasharray", "8 5");
          svgEl.appendChild(preview);
        }
      }

      function getHandlePoint(canvasEl, nodeId, side) {
        const nodeEl = canvasEl.querySelector(`[data-node-id="${nodeId}"]`);
        if (!nodeEl) return null;
        let selector = '[data-handle="in"]';
        if (side === "out") selector = '[data-handle="out"][data-branch="default"]';
        if (side === "out_true") selector = '[data-handle="out"][data-branch="true"]';
        if (side === "out_false") selector = '[data-handle="out"][data-branch="false"]';
        if (side === "out_approve") selector = '[data-handle="out"][data-branch="approve"]';
        if (side === "out_reject") selector = '[data-handle="out"][data-branch="reject"]';
        const handle = nodeEl.querySelector(selector);
        if (!handle) return null;
        const canvasRect = canvasEl.getBoundingClientRect();
        const hRect = handle.getBoundingClientRect();
        return {
          x: hRect.left - canvasRect.left + hRect.width / 2,
          y: hRect.top - canvasRect.top + hRect.height / 2
        };
      }

      function clamp(n, min, max) {
        return Math.min(max, Math.max(min, n));
      }

      function subtitle(item) {
        const c = item.config;
        if (item.type === "form") return c.title || "未命名表單";
        if (item.type === "condition") return `${c.sourceField || "欄位"} ${c.operator} ${c.compareFrom === "manual" ? (c.compareValue || "值") : (c.compareVar || "變數")}`;
        if (item.type === "approval") return c.title || "待設定審核";
        if (item.type === "sendAsUser") return c.subject || "待設定信件主旨";
        if (item.type === "agent") return `${c.task || "任務"} / max ${c.maxToken}`;
        if (item.type === "tool") return `${c.provider} / ${c.taskType}`;
        if (item.type === "mailReader") return `${c.mailbox} / ${c.scope}`;
        return "";
      }

      function row(label, inputHTML) {
        return `<div class="field"><label>${label}</label>${inputHTML}</div>`;

        else if (active.type === "tool") renderToolConfig(active, container);

        renderCommonActionName(active, container);

        const c = active.config;
        container.innerHTML = `
          <div class="section">
            <h3>Agent 設定</h3>
            ${row("任務類型*", `<select id="g_task">${["摘要", "分類", "擷取", "生成"].map((x) => `<option ${c.task === x ? "selected" : ""}>${x}</option>`).join("")}</select>`)}
            ${row("輸入內容*", `<textarea id="g_input">${escapeHtml(c.input)}</textarea>`)}
            ${row("Max Token", `<input id="g_max" type="number" value="${c.maxToken}" />`)}
          </div>
        `;
        container.querySelector("#g_task").onchange = (e) => setConfig({ task: e.target.value });
        container.querySelector("#g_input").oninput = (e) => setConfig({ input: e.target.value });
        container.querySelector("#g_max").oninput = (e) => setConfig({ maxToken: Number(e.target.value) || 0 });
      }

      function renderToolConfig(active, container) {
        const c = active.config;
        container.innerHTML = `
          <div class="section">
            <h3>工具設定</h3>
            ${row("任務名稱", `<input id="t_name" value="${escapeHtml(c.taskName)}" />`)}
            ${row("Tool Provider*", `<select id="t_provider">${providers.map((p) => `<option ${c.provider === p ? "selected" : ""}>${p}</option>`).join("")}</select>`)}
            ${row("任務類型*", `<select id="t_type">${["查詢", "草稿", "摘要"].map((x) => `<option ${c.taskType === x ? "selected" : ""}>${x}</option>`).join("")}</select>`)}
            ${row("輸入內容*", `<textarea id="t_input">${escapeHtml(c.input)}</textarea>`)}
          </div>
          <div class="section">
            <h3>Provider 專屬欄位</h3>
            <div id="providerExtra"></div>
          </div>
        `;
        container.querySelector("#t_name").oninput = (e) => setConfig({ taskName: e.target.value });
        container.querySelector("#t_provider").onchange = (e) => setConfig({ provider: e.target.value, providerCfg: {} });
        container.querySelector("#t_type").onchange = (e) => setConfig({ taskType: e.target.value });
        container.querySelector("#t_input").oninput = (e) => setConfig({ input: e.target.value });
        renderProviderExtra(c.provider, c.providerCfg, container.querySelector("#providerExtra"), active);
      }

      function renderProviderExtra(provider, cfg, mount, active) {
        const sharedKb = ["HR-KB", "Finance-KB", "IT-SOP"];
        if (provider === "FedGPT Agentic RAG" || provider === "FedGPT Simple RAG") {
          mount.innerHTML = `
            ${row("KB 選擇*", `<select id="p_kb">${sharedKb.map((x) => `<option ${cfg.kb === x ? "selected" : ""}>${x}</option>`).join("")}</select>`)}
            ${row("相似度門檻", `<input id="p_sim" type="number" min="0" max="1" step="0.01" value="${cfg.sim ?? ""}" />`)}
            ${row("查無處理", `<select id="p_miss"><option ${cfg.miss === "fallback" ? "selected" : ""}>fallback</option><option ${cfg.miss === "人工" ? "selected" : ""}>人工</option></select>`)}
            ${row("輸出格式", `<select id="p_fmt"><option ${cfg.fmt === "text" ? "selected" : ""}>text</option><option ${cfg.fmt === "JSON" ? "selected" : ""}>JSON</option></select>`)}
          `;
          mount.querySelector("#p_kb").onchange = (e) => updateProviderCfg(active, { kb: e.target.value });
          mount.querySelector("#p_sim").oninput = (e) => updateProviderCfg(active, { sim: e.target.value });
          mount.querySelector("#p_miss").onchange = (e) => updateProviderCfg(active, { miss: e.target.value });
          mount.querySelector("#p_fmt").onchange = (e) => updateProviderCfg(active, { fmt: e.target.value });
          return;
        }
        if (provider === "KB Toolkit") {
          mount.innerHTML = `
            ${row("KB 選擇*", `<select id="k_kb">${sharedKb.map((x) => `<option ${cfg.kb === x ? "selected" : ""}>${x}</option>`).join("")}</select>`)}
            ${row("查詢模式", `<select id="k_mode"><option ${cfg.mode === "精準" ? "selected" : ""}>精準</option><option ${cfg.mode === "模糊" ? "selected" : ""}>模糊</option></select>`)}
            ${row("輸出格式", `<select id="k_fmt"><option ${cfg.fmt === "text" ? "selected" : ""}>text</option><option ${cfg.fmt === "JSON" ? "selected" : ""}>JSON</option></select>`)}
          `;
          mount.querySelector("#k_kb").onchange = (e) => updateProviderCfg(active, { kb: e.target.value });
          mount.querySelector("#k_mode").onchange = (e) => updateProviderCfg(active, { mode: e.target.value });
          mount.querySelector("#k_fmt").onchange = (e) => updateProviderCfg(active, { fmt: e.target.value });
          return;
        }
        if (provider === "FedGPT FAQ") {
          mount.innerHTML = `
            ${row("FAQ 集合*", `<select id="f_set"><option ${cfg.set === "General-FAQ" ? "selected" : ""}>General-FAQ</option><option ${cfg.set === "HR-FAQ" ? "selected" : ""}>HR-FAQ</option></select>`)}
            ${row("未命中處理", `<select id="f_miss"><option ${cfg.miss === "fallback" ? "selected" : ""}>fallback</option><option ${cfg.miss === "人工" ? "selected" : ""}>人工</option></select>`)}
            ${row("輸出格式", `<select id="f_fmt"><option selected>text</option></select>`)}
          `;
          mount.querySelector("#f_set").onchange = (e) => updateProviderCfg(active, { set: e.target.value });
          mount.querySelector("#f_miss").onchange = (e) => updateProviderCfg(active, { miss: e.target.value });
          return;
        }
        mount.innerHTML = `
          ${row("Gmail 帳號*", `<select id="g_acc"><option ${cfg.acc === "sales@company.com" ? "selected" : ""}>sales@company.com</option><option ${cfg.acc === "cs@company.com" ? "selected" : ""}>cs@company.com</option></select>`)}
          ${row("Query 模式*", `<select id="g_mode"><option ${cfg.mode === "基礎" ? "selected" : ""}>基礎</option><option ${cfg.mode === "Gmail Query" ? "selected" : ""}>Gmail Query</option></select>`)}
          ${row("from", `<input id="g_from" value="${escapeHtml(cfg.from || "")}" />`)}
          ${row("to", `<input id="g_to" value="${escapeHtml(cfg.to || "")}" />`)}
          ${row("subject", `<input id="g_subject" value="${escapeHtml(cfg.subject || "")}" />`)}
          ${row("Gmail Query", `<textarea id="g_q">${escapeHtml(cfg.query || "")}</textarea>`)}
          ${row("讀取範圍", `<select id="g_scope"><option ${cfg.scope === "最新一封" ? "selected" : ""}>最新一封</option><option ${cfg.scope === "N 封" ? "selected" : ""}>N 封</option></select>`)}
          ${row("是否下載附件", `<input id="g_download" type="checkbox" ${cfg.download ? "checked" : ""} />`)}
          ${row("輸出格式", `<select id="g_fmt"><option ${cfg.fmt === "text" ? "selected" : ""}>text</option><option ${cfg.fmt === "JSON" ? "selected" : ""}>JSON</option></select>`)}
        `;
        mount.querySelector("#g_acc").onchange = (e) => updateProviderCfg(active, { acc: e.target.value });
        mount.querySelector("#g_mode").onchange = (e) => updateProviderCfg(active, { mode: e.target.value });
        mount.querySelector("#g_from").oninput = (e) => updateProviderCfg(active, { from: e.target.value });
        mount.querySelector("#g_to").oninput = (e) => updateProviderCfg(active, { to: e.target.value });
        mount.querySelector("#g_subject").oninput = (e) => updateProviderCfg(active, { subject: e.target.value });
        mount.querySelector("#g_q").oninput = (e) => updateProviderCfg(active, { query: e.target.value });
        mount.querySelector("#g_scope").onchange = (e) => updateProviderCfg(active, { scope: e.target.value });
        mount.querySelector("#g_download").onchange = (e) => updateProviderCfg(active, { download: e.target.checked });
        mount.querySelector("#g_fmt").onchange = (e) => updateProviderCfg(active, { fmt: e.target.value });
      }

      function updateProviderCfg(active, patch) {
        active.config.providerCfg = { ...active.config.providerCfg, ...patch };
        saveDraft();
      }

      function renderMailReaderConfig(active, container) {
        const c = active.config;
        container.innerHTML = `
          <div class="section">
            <h3>信箱設定</h3>
            ${row("信箱帳號*", `<select id="m_box"><option ${c.mailbox === "service@fedflow.local" ? "selected" : ""}>service@fedflow.local</option><option ${c.mailbox === "ops@fedflow.local" ? "selected" : ""}>ops@fedflow.local</option></select>`)}
            ${row("篩選模式*", `<select id="m_mode"><option ${c.mode === "基礎" ? "selected" : ""}>基礎</option><option ${c.mode === "Gmail Query" ? "selected" : ""}>Gmail Query</option></select>`)}
          </div>
          <div class="section">
            <h3>篩選條件</h3>
            ${row("寄件者 from", `<input id="m_from" value="${escapeHtml(c.from)}" />`)}
            ${row("收件者 to", `<input id="m_to" value="${escapeHtml(c.to)}" />`)}
            ${row("主旨關鍵字", `<input id="m_subject" value="${escapeHtml(c.subject)}" />`)}
            ${row("Gmail Query", `<textarea id="m_query">${escapeHtml(c.query)}</textarea>`)}
          </div>
          <div class="section">
            <h3>讀取控制</h3>
            ${row("讀取範圍*", `<select id="m_scope"><option ${c.scope === "最新一封" ? "selected" : ""}>最新一封</option><option ${c.scope === "最新 N 封" ? "selected" : ""}>最新 N 封</option></select>`)}
            ${c.scope === "最新 N 封" ? row("N", `<input id="m_n" type="number" value="${c.n}" />`) : ""}
            ${row("是否下載附件", `<input id="m_download" type="checkbox" ${c.download ? "checked" : ""} />`)}
            ${row("標記為已讀", `<input id="m_read" type="checkbox" ${c.markRead ? "checked" : ""} />`)}
          </div>
        `;
        container.querySelector("#m_box").onchange = (e) => setConfig({ mailbox: e.target.value });
        container.querySelector("#m_mode").onchange = (e) => setConfig({ mode: e.target.value });
        container.querySelector("#m_from").oninput = (e) => setConfig({ from: e.target.value });
        container.querySelector("#m_to").oninput = (e) => setConfig({ to: e.target.value });
        container.querySelector("#m_subject").oninput = (e) => setConfig({ subject: e.target.value });
        container.querySelector("#m_query").oninput = (e) => setConfig({ query: e.target.value });
        container.querySelector("#m_scope").onchange = (e) => setConfig({ scope: e.target.value });
        if (c.scope === "最新 N 封") container.querySelector("#m_n").oninput = (e) => setConfig({ n: Number(e.target.value) || 1 });
        container.querySelector("#m_download").onchange = (e) => setConfig({ download: e.target.checked });
        container.querySelector("#m_read").onchange = (e) => setConfig({ markRead: e.target.checked });
      }

      function escapeHtml(str) {
        return String(str || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      document.getElementById("backHomeHeader").onclick = () => {
        window.location.href = "./index.html";
      };
      document.getElementById("backHomeTop").onclick = () => {
        window.location.href = "./index.html";
      };
      document.getElementById("editFlowNameBtn").onclick = () => {
        const next = window.prompt("流程名稱", currentFlowName);
        if (next == null) return;
        setFlowName(next);
        saveDraft();
      };

      document.getElementById("saveFlow").onclick = () => {
        const payload = upsertCurrentFlow();
        localStorage.setItem(PUBLISHED_KEY, JSON.stringify({ ...payload, version: 1, savedAt: payload.updatedAt }));
        saveDraft();
        alert("流程已儲存");
      };

      const canvasEl = document.getElementById("canvas");
      document.getElementById("paletteSearch").addEventListener("input", renderPalette);
      canvasEl.addEventListener("click", (e) => {
        if (suppressCanvasCancelOnce) {
          suppressCanvasCancelOnce = false;
          return;
        }
        if (e.target !== canvasEl && !e.target.classList.contains("edge-layer")) return;
        if (!connectFromId) return;
        connectFromId = null;
        connectFromBranch = null;
        connectPointer = null;
        renderCanvas();
      });
      canvasEl.addEventListener("mousemove", (e) => {
        if (!connectFromId) return;
        connectPointer = { x: e.clientX, y: e.clientY };
        const svg = canvasEl.querySelector(".edge-layer");
        renderEdges(svg, canvasEl);
      });
      canvasEl.addEventListener("dragover", (e) => {
        e.preventDefault();
        canvasEl.classList.add("dropping");
        e.dataTransfer.dropEffect = "copy";
      });
      canvasEl.addEventListener("dragleave", () => {
        canvasEl.classList.remove("dropping");
      });
      canvasEl.addEventListener("drop", (e) => {
        e.preventDefault();
        canvasEl.classList.remove("dropping");
        const type = e.dataTransfer.getData("text/action-type");
        if (!type || !actionMeta[type]) return;
        const rect = canvasEl.getBoundingClientRect();
        addAction(type, { x: e.clientX - rect.left - 125, y: e.clientY - rect.top - 40 });
      });
      window.addEventListener("mousemove", (e) => {
        if (!connectFromId) return;
        connectPointer = { x: e.clientX, y: e.clientY };
        const svg = canvasEl.querySelector(".edge-layer");
        renderEdges(svg, canvasEl);
      });

      const params = new URLSearchParams(window.location.search);
      const flowIdFromQuery = params.get("id");
      if (flowIdFromQuery) {
        const target = getAllFlows().find((x) => x.id === flowIdFromQuery);
        if (target) {
          currentFlowId = target.id;
          setFlowName(target.name || "未命名流程");
          flow = Array.isArray(target.flow) ? target.flow : [];
          edges = normalizeEdges(target.edges, flow);
          activeId = flow[0]?.id || null;
        }
      } else {
        const savedDraft = localStorage.getItem(DRAFT_KEY);
        if (savedDraft) {
          try {
            const parsed = JSON.parse(savedDraft);
            currentFlowId = parsed.id || null;
            setFlowName(parsed.name || "未命名流程");
            if (Array.isArray(parsed.flow)) {
              flow = parsed.flow;
              edges = normalizeEdges(parsed.edges, flow);
              activeId = flow[0]?.id || null;
            }
          } catch (err) {
            // ignore invalid draft
          }
        }
      }
      if (!currentFlowId) currentFlowId = uid();
      if (!document.getElementById("flowTitle").textContent.trim()) setFlowName("未命名流程");

      renderPalette();
      renderCanvas();
      renderConfig();
    </script>
  </body>
</html>
